name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,security]"

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Security scan (Bandit)
        run: bandit -r src/ -c pyproject.toml --severity-level high
        if: always()

      - name: Dependency vulnerability scan (Safety)
        run: safety check --full-report --exit-code
        if: always()

      - name: Package vulnerability scan (pip-audit)
        run: pip-audit --strict
        if: always()

      - name: Test with coverage
        run: python -m pytest tests/ -q --tb=short -x --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage report (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: error

      - name: Upload coverage to CodeCov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          flags: unittests
          name: codecov-orion
          fail_ci_if_error: false

      - name: Archive benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.python-version }}
          path: benchmark_results_*
          if-no-files-found: ignore

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          load: true
          tags: orion-api:ci

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          load: true
          tags: orion-ui:ci

      - name: Build RAG service image
        uses: docker/build-push-action@v6
        with:
          context: src/tool/RAGTool
          file: src/tool/RAGTool/Dockerfile
          load: true
          tags: orion-rag-service:ci

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          load: true
          tags: orion-api:ci

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          load: true
          tags: orion-ui:ci

      - name: Build RAG service image
        uses: docker/build-push-action@v6
        with:
          context: src/tool/RAGTool
          file: src/tool/RAGTool/Dockerfile
          load: true
          tags: orion-rag-service:ci

      - name: Start containers with docker compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          echo "Containers started, waiting for services to be ready..."

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:61888/api/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 3
          done
          curl -sf http://localhost:61888/api/health || {
            echo "API failed to become ready"
            docker compose logs api
            exit 1
          }

      - name: Install Python dependencies for smoke test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run smoke tests
        run: python -m pytest tests/test_smoke_containers.py -q --tb=short -x
        env:
          API_URL: http://localhost:61888
          UI_URL: http://localhost:80
          PROXY_URL: http://localhost:80

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down -v
