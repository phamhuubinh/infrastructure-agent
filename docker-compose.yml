services:
  reverse-proxy:
    image: nginx:alpine
    container_name: orion-reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - ui
      - dify-web
      - rag-service
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: orion-api
    env_file:
      - docker-compose.env
    environment:
      ORION_DATABASE_URL: postgresql://orion:orion_dev@postgres:5432/orion
      RAG_SERVICE_URL: http://rag-service:8080
      DIFY_API_URL: http://dify-api:5001
      DIFY_WEB_URL: http://dify-web:3000
    volumes:
      - orion-sessions:/root/.orion/sessions
    depends_on:
      - postgres
      - rag-service
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: orion-ui
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: orion-pg
    env_file:
      - docker-compose.env
    volumes:
      - orion-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dify-api:
    image: langgenius/dify-api:1.0.0
    container_name: orion-dify-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - docker-compose.env
    environment:
      MODE: api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-orion}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-orion_dev}
      DB_DATABASE: ${POSTGRES_DB:-orion}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-orion_redis}
      SECRET_KEY: ${DIFY_SECRET_KEY:-orion-dify-secret-change-in-prod}
      INIT_PASSWORD: ${DIFY_INIT_PASSWORD:-orion_dify}
      LOG_LEVEL: INFO
      CONSOLE_TYPE: disabled
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
    volumes:
      - dify-storage:/app/api/storage
    restart: unless-stopped

  dify-web:
    image: langgenius/dify-web:1.0.0
    container_name: orion-dify-web
    depends_on:
      - dify-api
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""
      SENTRY_DSN: ""
    ports:
      - "3000:3000"
    restart: unless-stopped

  rag-service:
    build:
      context: .
      dockerfile: src/tool/RAGTool/Dockerfile
    container_name: orion-rag-service
    environment:
      RAG_EMBEDDING_PROVIDER: hash
      RAG_VECTOR_STORE: memory
      RAG_RERANKER: noop
      RAG_OCR_PROVIDER: noop
      RAG_LLM_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: orion-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-orion_redis}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  orion-sessions:
  orion-pgdata:
  dify-storage:
  redis-data:
