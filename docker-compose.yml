services:
  reverse-proxy:
    image: nginx:alpine
    container_name: orion-reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - ui
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: orion-api
    env_file:
      - docker-compose.env
    volumes:
      - orion-sessions:/root/.orion/sessions
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: orion-ui
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: orion-pg
    env_file:
      - docker-compose.env
    volumes:
      - orion-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  orion-sessions:
  orion-pgdata:
